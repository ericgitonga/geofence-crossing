id: geofence_crossing

requirements:
  - name: ecoscope-platform
    version: 2.13.0
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: pydeck
    version: 0.9.2
    channel: conda-forge
  - name: geofence-crossing-tasks
    path: "/home/gitonga/Develop/PGAFF/repos/wt/geofence-crossing/ecoscope-workflows-geofence-crossing-workflow/geofence-crossing-tasks"
    editable: true

rjsf-overrides:
  $defs:
    LocalFileSpatialFeatures.properties.file_path.default: ""
    LocalFileSpatialFeatures.properties.layer.type: ["string", "null"]
    RemoteFileSpatialFeatures.properties.url.default: ""
    RemoteFileSpatialFeatures.properties.layer.type: ["string", "null"]

  properties:
    roi.properties.config.anyOf:
      [
        { "$ref": "#/$defs/LocalFileSpatialFeatures" },
        { "$ref": "#/$defs/RemoteFileSpatialFeatures" },
        { "$ref": "#/$defs/EarthRangerSpatialFeatures" },
      ]

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:

  # === SETUP ===

  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"

  - name: Extract Timezone
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  # === SUBJECT TRACKS ===

  - name: Subject Group Observations
    id: subject_obs
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false

  - name: Subject Tracks
    id: subject_tracks
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.subject_obs.return }}

  # === REGION OF INTEREST ===

  - name: Load Region of Interest
    id: roi
    task: load_spatial_features_group

  # === GROUPERS ===

  - name: Set Groupers
    id: groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: "extra__subject__name"

  # === GEOFENCE CROSSING DETECTION ===

  - name: Detect Geofence Crossings
    id: crossings
    task: detect_geofence_crossings
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      trajectory: ${{ workflow.subject_tracks.return }}
      region_of_interest: ${{ workflow.roi.return }}

  - name: Convert Crossing Times to Timezone
    id: crossings_tz
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.crossings.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["crossing_time"]

  - name: Apply Direction Colormap
    id: crossings_colormap
    task: apply_color_map
    partial:
      df: ${{ workflow.crossings_tz.return }}
      input_column_name: "direction"
      colormap: ["#008000", "#CC0000"]
      output_column_name: "direction_colormap"

  # Add temporal index for grouper-aware table views
  - name: Add Temporal Index
    id: temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.crossings_colormap.return }}
      time_col: "crossing_time"
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: "mixed"

  # Split crossings by subject group (for per-subject table views)
  - name: Split by Subject
    id: split_crossings
    task: split_groups
    partial:
      df: ${{ workflow.temporal_index.return }}
      groupers: ${{ workflow.groupers.return }}

  # === MAP (per-subject views: ROI boundary + per-subject crossing points) ===

  - name: Set Base Maps
    id: base_map_defs
    task: set_base_maps

  - name: Rename Columns for Map Display
    id: crossings_map_display
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        crossing_time: "Crossing Time"
        direction: "Direction"
        extra__subject__name: "Subject"
      raise_if_not_found: false
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_crossings.return }}

  - name: Create ROI Boundary Layer
    id: roi_polygon_layer
    task: create_polygon_layer
    partial:
      geodataframe: ${{ workflow.roi.return }}
      layer_style:
        filled: false
        stroked: true
        get_line_color: [30, 30, 200, 200]
        get_line_width: 2
      legend:
        title: "Region of Interest"
        values:
          - label: "Boundary"
            color: "rgba(30, 30, 200, 0.8)"
      zoom: true

  - name: Create Crossing Points Layer
    id: crossing_point_layer
    task: create_point_layer
    partial:
      layer_style:
        fill_color_column: "direction_colormap"
        get_radius: 8
      legend:
        label_column: "Direction"
        color_column: "direction_colormap"
      tooltip_columns: ["Crossing Time", "Direction", "Subject"]
    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.crossings_map_display.return }}

  - name: Combine Map Layers
    id: combined_layers
    task: combine_map_layers
    partial:
      static_layers: ${{ workflow.roi_polygon_layer.return }}
    mapvalues:
      argnames: grouped_layers
      argvalues: ${{ workflow.crossing_point_layer.return }}

  - name: Draw Crossings Ecomap
    id: ecomap
    task: draw_ecomap
    partial:
      tile_layers: ${{ workflow.base_map_defs.return }}
      north_arrow_style:
        placement: "top-left"
      legend_style:
        title: "Crossings"
        placement: "bottom-right"
      static: false
      max_zoom: 20
    mapvalues:
      argnames: geo_layers
      argvalues: ${{ workflow.combined_layers.return }}

  - name: Persist Ecomap
    id: ecomap_html_url
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.ecomap.return }}

  - name: Create Map Widget
    id: map_widget
    task: create_map_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: "Geofence Crossings Map"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.ecomap_html_url.return }}

  - name: Merge Map Widget Views
    id: merged_map_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.map_widget.return }}

  # === TABLE (per-subject views) ===

  - name: Rename Columns for Table Display
    id: crossings_table_display
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        crossing_time: "Crossing Time"
        direction: "Direction"
        extra__subject__name: "Subject"
        longitude: "Longitude"
        latitude: "Latitude"
      raise_if_not_found: false
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_crossings.return }}

  - name: Draw Crossings Table
    id: crossings_table
    task: draw_table
    partial:
      columns: ["Crossing Time", "Direction", "Subject", "Longitude", "Latitude"]
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.crossings_table_display.return }}

  - name: Persist Crossings Table
    id: crossings_table_html_url
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.crossings_table.return }}

  - name: Create Table Widget
    id: table_widget
    task: create_table_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: "Geofence Crossings Table"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.crossings_table_html_url.return }}

  - name: Merge Table Widget Views
    id: merged_table_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.table_widget.return }}

  # === DASHBOARD ===

  - name: Create Dashboard
    id: dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.merged_map_widget.return }}
        - ${{ workflow.merged_table_widget.return }}
      groupers: ${{ workflow.groupers.return }}
      time_range: ${{ workflow.time_range.return }}
